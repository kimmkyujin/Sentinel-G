<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel-G AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; /* Bluish white */
            --chat-bg: transparent; 
            --user-msg: linear-gradient(135deg, #3b82f6, #6366f1);
            --ai-msg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --border: rgba(0, 0, 0, 0.08);
            --accent: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(ellipse at top left, rgba(59, 130, 246, 0.15) 0%, transparent 60%), 
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
        }

        header {
            padding: 1.2rem 2.5rem;
            background: rgba(238, 242, 255, 0.95); /* 네이비 빛이 도는 흰색 */
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .header-titles {
            display: flex;
            flex-direction: column;
        }

        .header-titles h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #0f172a, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upa-badge {
            font-size: 0.75rem;
            color: #0ea5e9;
            background: rgba(14, 165, 233, 0.05);
            border: 1px solid rgba(14, 165, 233, 0.3);
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Comic Sans MS', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(14, 165, 233, 0.1);
        }

        .header-titles p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 1rem 1.4rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.2px;
        }

        .user .bubble {
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
            color: white;
            font-weight: 500;
        }

        .ai .bubble {
            background: var(--ai-msg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        /* Markdown Styles inside AI bubble */
        .ai .bubble p { margin-bottom: 0.75em; }
        .ai .bubble p:last-child { margin-bottom: 0; }
        .ai .bubble strong { color: #000; font-weight: 600; }
        .ai .bubble code { background: rgba(0,0,0,0.05); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #2563eb; }

        .typing-indicator {
            display: none;
            padding: 1rem 1.4rem;
            background: var(--ai-msg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        .input-wrapper {
            width: 100%;
            padding: 1rem 1rem 2rem;
            display: flex;
            justify-content: center;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
            z-index: 10;
        }

        .input-container {
            width: 100%;
            max-width: 850px;
            position: relative;
            display: flex;
            align-items: flex-end;
            background: var(--input-bg);
            border-radius: 24px;
            padding: 0.6rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-container:focus-within {
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 0 0 3px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--input-text);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            padding: 0.8rem 1rem;
            resize: none;
            max-height: 150px;
            min-height: 48px;
            outline: none;
            line-height: 1.5;
            font-weight: 500;
        }

        textarea::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        .send-btn {
            background: var(--user-msg);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 0.5rem;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-bottom: 2px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            fill: white;
            width: 20px;
            height: 20px;
            margin-left: 2px;
        }

        .watermark {
            position: fixed;
            bottom: 12px;
            right: 18px;
            font-size: 0.65rem;
            color: rgba(0, 0, 0, 0.15);
            z-index: 100;
            pointer-events: none;
            letter-spacing: 1px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-titles">
            <div class="title-row">
                <h1>Sentinel-G AI</h1>
                <span class="upa-badge">우파루파</span>
            </div>
            <p>Cognitive Security Agent</p>
        </div>
    </header>

    <main id="chat-main">
        <div class="chat-container" id="chat-container">
            <div class="message ai">
                <div class="bubble">안녕하세요! 저는 인프라 보안을 관리하는 지능형 에이전트입니다. 방화벽 개방과 같은 보안 제어 작업을 도와드릴 수 있습니다. 어떤 작업이 필요하신가요?</div>
            </div>
            <!-- Messages will be injected here -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </main>

    <div class="input-wrapper">
        <div class="input-container">
            <textarea id="message-input" rows="1" placeholder="메시지를 입력하세요 (예: 192.168.1.100 80번 포트 1시간 동안 열어줘)"></textarea>
            <button class="send-btn" id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
    
    <div class="watermark">우파루파</div>

    <script>
        // 고유 세션 ID 생성
        const sessionId = 'session_' + Math.random().toString(36).substring(2, 15);
        
        const chatContainer = document.getElementById('chat-container');
        const chatMain = document.getElementById('chat-main');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // 자동 크기 조절 textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });

        // 엔터키 전송 (Shift+Enter는 줄바꿈)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (sender === 'ai') {
                // Markdown 적용
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }

            msgDiv.appendChild(bubble);
            chatContainer.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMain.scrollTop = chatMain.scrollHeight;
        }

        // WebSocket 실시간 알림 연결
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/alert`;
        
        function connectWebSocket() {
            const socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                console.log("[WebSocket] 알림 서버에 연결되었습니다.");
            };
            
            socket.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'alert' && data.message) {
                        appendMessage('ai', data.message);
                    }
                } catch(e) {
                    console.error("웹소켓 데이터 파싱 오류:", e);
                }
            };
            
            socket.onclose = function(event) {
                console.log("[WebSocket] 연결이 끊겼습니다. 재연결 시도...");
                setTimeout(connectWebSocket, 3000); // 3초 후 재연결 시도
            };
            
            socket.onerror = function(error) {
                console.error("[WebSocket] 오류 발생:", error);
            };
        }
        
        // 초기 연결
        connectWebSocket();

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // UI 업데이트
            messageInput.value = '';
            messageInput.style.height = 'auto';
            appendMessage('user', text);
            
            // 타이핑 인디케이터 표시
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text
                    })
                });

                typingIndicator.style.display = 'none';

                if (!response.ok) {
                    let errorMsg = "서버 오류가 발생했습니다.";
                    try {
                        const errData = await response.json();
                        if (errData && errData.detail) {
                            if (errData.detail.includes("429") || errData.detail.includes("quota") || errData.detail.toLowerCase().includes("exceeded")) {
                                errorMsg = "API 용량이 초과되었습니다. 잠시 후 다시 시도해주세요.";
                            } else {
                                errorMsg = `오류 발생: ${errData.detail}`;
                            }
                        }
                    } catch(e) {}
                    
                    appendMessage('ai', errorMsg);
                    return;
                }

                const data = await response.json();
                appendMessage('ai', data.response);

            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('ai', '서버와 연결이 끊겼습니다. 백엔드 서버가 켜져있는지 확인해 주세요.');
                console.error("Network error:", error);
            }
        }
    </script>
</body>
</html>
